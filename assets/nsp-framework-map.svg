<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Post-Cold War National Security Policy framework map</title>
  <desc id="desc">A four-lane framework map translating the Reagan National Security Policy structure into Clinton-era post-Cold War themes.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf3ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#16202b" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="18" fill="#f7faf8"/>
  <path d="M54 62h612v296H54z" fill="url(#paper)" stroke="#d8dfda" filter="url(#shadow)"/>
  <path d="M54 62h612v58H54z" fill="#25364f"/>
  <text x="82" y="98" fill="#ffffff" font-family="Georgia, serif" font-size="28" font-weight="700">FRUS VI NSP Workspace</text>
  <text x="82" y="146" fill="#8b3940" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2">REAGAN FRAME TO CLINTON SETTING</text>
  <g font-family="Inter, Arial, sans-serif" font-weight="800">
    <g transform="translate(82 176)">
      <rect width="252" height="58" rx="8" fill="#ffffff" stroke="#d8dfda"/>
      <circle cx="29" cy="29" r="16" fill="#25364f"/>
      <text x="25" y="34" fill="#fff" font-size="15">1</text>
      <text x="58" y="25" fill="#25364f" font-size="16">Defense Strategy</text>
      <text x="58" y="43" fill="#5c6670" font-size="12">force plans, budgets, NSC process</text>
    </g>
    <g transform="translate(386 176)">
      <rect width="252" height="58" rx="8" fill="#ffffff" stroke="#d8dfda"/>
      <circle cx="29" cy="29" r="16" fill="#2e675b"/>
      <text x="25" y="34" fill="#fff" font-size="15">2</text>
      <text x="58" y="25" fill="#25364f" font-size="16">Risk Reduction</text>
      <text x="58" y="43" fill="#5c6670" font-size="12">post-Soviet and transnational</text>
    </g>
    <g transform="translate(82 258)">
      <rect width="252" height="58" rx="8" fill="#ffffff" stroke="#d8dfda"/>
      <circle cx="29" cy="29" r="16" fill="#486c95"/>
      <text x="25" y="34" fill="#fff" font-size="15">3</text>
      <text x="58" y="25" fill="#25364f" font-size="16">Technology Control</text>
      <text x="58" y="43" fill="#5c6670" font-size="12">stockpile, space, export controls</text>
    </g>
    <g transform="translate(386 258)">
      <rect width="252" height="58" rx="8" fill="#ffffff" stroke="#d8dfda"/>
      <circle cx="29" cy="29" r="16" fill="#8b3940"/>
      <text x="25" y="34" fill="#fff" font-size="15">4</text>
      <text x="58" y="25" fill="#25364f" font-size="16">Preparedness</text>
      <text x="58" y="43" fill="#5c6670" font-size="12">contingencies and infrastructure</text>
    </g>
  </g>
  <path d="M344 205h32M344 287h32M360 234v24" stroke="#b88b35" stroke-width="4" stroke-linecap="round"/>
  <text x="82" y="348" fill="#5c6670" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Directive handles, public finding aids, and source-control notes stay separate until document-level FRUS review.</text>
</svg>
